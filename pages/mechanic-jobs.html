<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="งานทั้งหมด - Dashboard ช่าง">
    <title>งานทั้งหมด - HelpMeCar</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/mechanic.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="mechanic-dashboard.html" class="navbar-brand">
                🔧 HelpMeCar
            </a>
            <button class="navbar-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <ul class="navbar-menu" id="navMenu">
                <li><a href="mechanic-dashboard.html" class="navbar-link">Dashboard</a></li>
                <li><a href="mechanic-jobs.html" class="navbar-link active">งานทั้งหมด</a></li>
                <li class="navbar-divider"></li>
                <li><a href="../index.html" class="navbar-link owner-mode-btn">
                        🚗 โหมดเจ้าของ
                    </a></li>
                <li>
                    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
                        <span class="icon" id="themeIcon">🌙</span>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container section">
        <div class="flex-between mb-4">
            <h1 class="mb-0" style="font-size: 1.75rem;">📋 งานทั้งหมด</h1>
            <div class="text-muted" id="jobCount">0 งาน</div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">ทั้งหมด</button>
            <button class="filter-tab" data-filter="pending">⏳ รอรับงาน</button>
            <button class="filter-tab" data-filter="accepted">⚡ กำลังทำ</button>
            <button class="filter-tab" data-filter="completed">✅ เสร็จสิ้น</button>
        </div>

        <!-- Jobs List -->
        <div id="jobsList" class="grid grid-1 gap-3">
            <!-- Jobs will be populated here -->
            <div class="text-center py-5 text-muted">
                <p>กำลังโหลดข้อมูล...</p>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/mechanic-jobs.js"></script>
</body>

</html>

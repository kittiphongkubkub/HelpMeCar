<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="แดชบอร์ดช่างซ่อมรถ - HelpMeCar">
    <title>Dashboard ช่าง - HelpMeCar</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/mechanic.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="mechanic-dashboard.html" class="navbar-brand">
                🔧 HelpMeCar
            </a>
            <button class="navbar-toggle" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="navbar-menu">
                <li><a href="mechanic-dashboard.html" class="navbar-link active">Dashboard</a></li>
                <li><a href="mechanic-jobs.html" class="navbar-link">งานทั้งหมด</a></li>
                <li class="navbar-divider"></li>
                <li><a href="../index.html" class="navbar-link" style="background: linear-gradient(135deg, #10B981, #059669); 
                           color: white; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600;">
                        🚗 โหมดเจ้าของ
                    </a></li>
                <li>
                    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
                        <span class="icon" id="themeIcon">🌙</span>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container section">
        <div class="flex-between mb-4">
            <div>
                <h1 class="mb-0" style="font-size: 1.75rem;">🔧 Dashboard</h1>
                <p class="text-muted mb-0" id="mechanicName">กำลังโหลด...</p>
            </div>
            <div class="text-end">
                <span class="badge badge-appointment" style="font-size: 0.9rem;">ออนไลน์</span>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-2 gap-3 mb-4">
            <div class="stat-card bg-gradient-blue">
                <div class="card-body">
                    <p class="stat-title">งานวันนี้</p>
                    <h2 class="stat-value" id="todayJobs">0</h2>
                </div>
            </div>
            <div class="stat-card bg-gradient-green">
                <div class="card-body">
                    <p class="stat-title">รายได้เดือนนี้</p>
                    <h2 class="stat-value" id="monthlyEarnings">฿0</h2>
                </div>
            </div>
            <div class="stat-card bg-gradient-orange">
                <div class="card-body">
                    <p class="stat-title">Rating</p>
                    <h2 class="stat-value" id="mechanicRating">0.0 ⭐</h2>
                </div>
            </div>
            <div class="stat-card bg-gradient-purple">
                <div class="card-body">
                    <p class="stat-title">งานสำเร็จ</p>
                    <h2 class="stat-value" id="completedJobs">0</h2>
                </div>
            </div>
        </div>

        <!-- New Job Requests -->
        <div class="mb-4">
            <div class="flex-between mb-3">
                <h3 class="h5 mb-0">🆕 งานใหม่ที่รอรับ</h3>
                <a href="mechanic-jobs.html" class="text-muted" style="font-size: 0.9rem;">ดูทั้งหมด ></a>
            </div>
            <div id="pendingJobsList" class="grid grid-1 gap-3">
                <!-- Javascript will populate this -->
                <div class="text-center py-4 text-muted bg-white rounded-lg shadow-sm">
                    <p>ไม่มีงานใหม่ในขณะนี้</p>
                </div>
            </div>
        </div>

        <!-- Active Jobs -->
        <div class="mb-4">
            <div class="flex-between mb-3">
                <h3 class="h5 mb-0">⚡ งานที่กำลังทำ</h3>
            </div>
            <div id="activeJobsList" class="grid grid-1 gap-3">
                <!-- Javascript will populate this -->
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/mechanic-dashboard.js"></script>
</body>

</html>

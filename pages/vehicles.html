<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รถของฉัน - HelpMeCar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="../index.html" class="navbar-brand">
                🔧 HelpMeCar
            </a>

            <button class="navbar-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="navbar-menu">
                <li><a href="../index.html" class="navbar-link">หน้าหลัก</a></li>
                <li><a href="mechanics.html" class="navbar-link">ค้นหาช่าง</a></li>
                <li><a href="store.html" class="navbar-link">ร้านอะไหล่</a></li>
                <li><a href="history.html" class="navbar-link">ประวัติการซ่อม</a></li>
                <li><a href="vehicles.html" class="navbar-link active">รถของฉัน</a></li>
                <li><a href="consultation.html" class="navbar-link">ปรึกษาผู้เชี่ยวชาญ</a></li>
                <li>
                    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
                        <span class="icon" id="themeIcon">🌙</span>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container section">
        <div class="flex-between mb-4">
            <h1>🚗 รถของฉัน</h1>
            <button class="btn btn-primary" onclick="openAddVehicleModal()">➕ เพิ่มรถใหม่</button>
        </div>

        <!-- Vehicles Grid -->
        <div id="vehiclesGrid" class="grid grid-3">
            <!-- Vehicle cards will be populated here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="d-none text-center" style="padding: 4rem 2rem;">
            <div style="font-size: 5rem; margin-bottom: 1rem;">🚗</div>
            <h2>ยังไม่มีรถยนต์</h2>
            <p class="text-muted mb-3">เพิ่มรถยนต์เพื่อเริ่มใช้งานระบบ</p>
            <button class="btn btn-primary" onclick="openAddVehicleModal()">➕ เพิ่มรถคันแรก</button>
        </div>
    </main>

    <!-- Add/Edit Vehicle Modal -->
    <div class="modal" id="vehicleModal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2 id="modalTitle">เพิ่มรถใหม่</h2>
                <button class="modal-close" onclick="modal.close('vehicleModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="vehicleForm" onsubmit="submitVehicleForm(event)">
                    <input type="hidden" id="editVehicleId" value="">

                    <div class="form-group">
                        <label for="make" class="form-label">ยี่ห้อ *</label>
                        <input type="text" id="make" name="make" class="form-control"
                            placeholder="เช่น Toyota, Honda, Mazda" required>
                    </div>

                    <div class="form-group">
                        <label for="model" class="form-label">รุ่น *</label>
                        <input type="text" id="model" name="model" class="form-control"
                            placeholder="เช่น Camry, Civic, 3" required>
                    </div>

                    <div class="form-group">
                        <label for="year" class="form-label">ปี *</label>
                        <input type="number" id="year" name="year" class="form-control" placeholder="เช่น 2020"
                            min="1900" max="2030" required>
                    </div>

                    <div class="form-group">
                        <label for="licensePlate" class="form-label">ทะเบียนรถ *</label>
                        <input type="text" id="licensePlate" name="licensePlate" class="form-control"
                            placeholder="เช่น กท 1234" required>
                    </div>

                    <div class="form-group">
                        <label for="mileage" class="form-label">เลขไมล์ปัจจุบัน (กม.) *</label>
                        <input type="number" id="mileage" name="mileage" class="form-control" placeholder="เช่น 45000"
                            min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="vin" class="form-label">เลขตัวถัง VIN (ไม่บังคับ)</label>
                        <input type="text" id="vin" name="vin" class="form-control" placeholder="17 ตัวอักษร"
                            maxlength="17">
                    </div>

                    <div class="flex-between" style="gap: 1rem; margin-top: 2rem;">
                        <button type="button" class="btn btn-outline" onclick="modal.close('vehicleModal')"
                            style="flex: 1;">ยกเลิก</button>
                        <button type="submit" class="btn btn-primary" style="flex: 1;">บันทึก</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/app.js"></script>
    <script src="../js/vehicles.js"></script>
</body>

</html>
